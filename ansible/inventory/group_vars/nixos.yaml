---
tailscale_authkey: "{{ lookup('env', 'TAILSCALE_AUTHKEY') }}"

aws_access_key_id: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') | default('', true) }}"
aws_default_region: "{{ lookup('env', 'AWS_DEFAULT_REGION') | default('us-east-1', true) }}"
aws_secret_access_key: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') | default('', true) }}"

feature_flag_s3_mirror: "{{ (s3_mirror_buckets | default([]) | length) > 0 }}"
feature_flag_aws: "{{ feature_flag_devops | bool or feature_flag_s3_mirror | bool }}"

ansible_python_interpreter: /run/current-system/sw/bin/python3

ssh_private_key_b64: "{{ lookup('env', 'SSH_PRIVATE_KEY') | default('', true) }}"
ssh_public_key_b64:  "{{ lookup('env', 'SSH_PUBLIC_KEY')  | default('', true) }}"

backup_runner_rsync_flags: "-aHAX --numeric-ids --delete-delay --partial --partial-dir=.rsync-partial --human-readable --sparse --mkpath"

feature_flag_node_exporter: true

nixos_dir: /etc/nixos-flakes
nixos_flake: "{{ nixos_dir }}/flake.nix"

managed_dirs_defaults:
  marker: ".restored_from_backup"
  restore_when: "empty_and_marker_missing"
  backup_when: "marker_present"
  allow_uninitialized_backup: false

managed_host_dirs: >-
  {%- set out = [] -%}
  {%- for item in (managed_host_volumes | default({}) | dict2items) -%}
    {%- set v = item.value -%}
    {%- if (v.type | default('local')) == 'local' -%}
      {%- set _ = out.append(v | combine({'name': item.key})) -%}
    {%- endif -%}
  {%- endfor -%}
  {{ out }}

managed_nfs_dirs: >-
  {%- set out = [] -%}
  {%- for item in (managed_host_volumes | default({}) | dict2items) -%}
    {%- set v = item.value -%}
    {%- if v.type is defined and v.type == 'nfs' -%}
      {%- set _ = out.append(v | combine({'name': item.key})) -%}
    {%- endif -%}
  {%- endfor -%}
  {{ out }}

converge_backup: >-
  {{
    managed_host_dirs | default([])
    | selectattr('backup', 'truthy')
    | list
    | length > 0
  }}

converge_restore: >-
  {{
    managed_host_dirs | default([])
    | selectattr('restore', 'truthy')
    | list
    | length > 0
  }}

nixos_converge_prepare_groups: >-
  {{
    ['lab'] + (['aws'] if (feature_flag_aws | default(false) | bool) else [])
  }}

nixos_converge_prepare_groups_all: ["lab"]

nixos_converge_prepare_dirs: >-
  {{
    (
      (nixos_converge_prepare_dirs_all | default([]))
      + (nixos_converge_prepare_dirs_devops | default([]))
      + (nixos_aws_secrets_dirs if (feature_flag_aws | default(false) | bool) else [])
    )
    | groupby('path')
    | map('last')
    | list
  }}

nixos_converge_prepare_dirs_all:
  - path: "{{ nixos_dir }}"
  - path: "{{ nixos_dir }}/assets"
  - path: "{{ nixos_dir }}/modules"
  - path: "{{ nixos_dir }}/hosts/{{ inventory_hostname }}"
  - path: "/etc/allans-home-lab/managed-directories"
  - path: "/run/secrets"
  - path: "/usr/local/sbin"
  - path: "/etc/allans-home-lab/secrets"
  - path: "/var/lib/homelab-secrets/ssh/root"
  - path: "/home/lab/.dotfiles"
    owner: "lab"
    group: "lab"

nixos_converge_prepare_files: >-
  {{
    (
      (nixos_converge_prepare_files_all | default([]))
      + (nixos_converge_prepare_files_devops | default([]))
    )
    | groupby('src')
    | map('last')
    | list
  }}

nixos_aws_secrets_dirs: 
  - path: "/var/lib/homelab-secrets/aws"

nixos_converge_prepare_files_all:
  - src: "tmux.conf.j2"
    dest: "{{ nixos_dir }}/assets/tmux.conf"
    owner: "root"
    group: "root"
    mode: "0644"
  - src: "starship.toml.j2"
    dest: "{{ nixos_dir }}/assets/starship.toml"
    owner: "root"
    group: "root"
    mode: "0644"
  - src: managed-directories-config.yaml.j2
    dest: /etc/allans-home-lab/managed-directories/config.yaml
    owner: root
    group: root
    mode: "0644"

nixos_converge_prepare_keys: >-
  {{
    (
      (nixos_converge_prepare_keys_all | default([]))
      | union(nixos_converge_prepare_keys_devops | default([]))
    )
    | sort
  }}

nixos_converge_prepare_keys_all: ["root"]

nixos_required_variables: >-
  {{
    (
      (nixos_required_variables_all    | default([]))
      +
      (nixos_required_variables_devops | default([]))
      +
      (['postgres_db_password'] if (converge_postgres_dump | default(false) | bool) else [])
      +
      (['tailscale_authkey']     if (feature_flag_tailscale     | default(false) | bool) else [])
    )
    | unique
  }}

nixos_required_variables_all:
  - nixos_dir
  - ssh_private_key_b64
  - ssh_public_key_b64
