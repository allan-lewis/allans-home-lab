---
nixos_docker_services:
  - it_tools
  - monitoring
  - nginx
  - no_geeks_brewing
  - portainer
  - twingate

managed_host_volumes:
  portainer_data:
    type: local
    local: "/var/lib/portainer"
    remote: "{{ default_remote_nas_per_host_backup_volume }}/portainer"
    restore: true
    backup: true
    owner: "lab"
    group: "lab"
    mode: "0755"
