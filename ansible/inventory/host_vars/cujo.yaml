---
nixos_is_virtual_machine: false
nixos_network_interface: "enp2s0"
nixos_network_address: "192.168.86.219"
nixos_ssh_key: "{{ lookup('env', 'TF_VAR_PROXMOX_VM_PUBLIC_KEY') }}"

converge_tailscale: false
tailscale_authkey: "{{ lookup('env', 'TAILSCALE_AUTHKEY') }}"

doppler_service_token: "{{ lookup('env', 'DOPPLER_SERVICE_TOKEN_MATURIN') }}"
doppler_config: "mat"
doppler_project: "orchestrator"

source_code_repos:
  - repo: git@github.com:allan-lewis/allans-home-lab.git
    dest: allans-home-lab
    version: main
  - repo: git@github.com:allan-lewis/dotfiles.git
    dest: dotfiles
    version: main
  - repo: git@github.com:allan-lewis/homelab-metrics.git
    dest: homelab-metrics 
    version: main
  - repo: git@github.com:allan-lewis/no-geeks-brewing-go.git
    dest: no-geeks-brewing-go
    version: main

managed_host_volumes:
  backup_restore_test:
    type: local
    local: /home/lab/backup-restore
    remote: "{{ default_remote_nas_per_host_backup_volume }}/backup-restore"
    restore: true
    backup: true
    owner: "lab"
    group: "lab"
    mode: "0755"

nixos_docker_services:
  - monitoring
