---
doppler_service_token: "{{ lookup('env', 'DOPPLER_SERVICE_TOKEN_MATURIN') }}"
doppler_config: "mat"
doppler_project: "orchestrator"

nixos_docker_services:
  - monitoring

managed_host_volumes:
  managed_dir_0:
    type: local
    local: "/home/lab/managed-dir-0"
    remote: "{{ default_remote_nas_per_host_backup_volume }}/managed-dir-0"
    restore: true
    backup: true
    owner: "lab"
    group: "lab"
    mode: "0755"
  managed_dir_1:
    type: local
    local: "/home/lab/managed-dir-1"
    remote: "{{ default_remote_nas_per_host_backup_volume }}/managed-dir-1"
    restore: true
    backup: true
    owner: "root"
    group: "root"
    mode: "0755"

source_code_repos:
  - repo: git@github.com:allan-lewis/allans-home-lab.git
    dest: allans-home-lab
    version: main
  - repo: git@github.com:allan-lewis/homelab-metrics.git
    dest: homelab-metrics 
    version: main
