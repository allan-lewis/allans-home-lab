---
nixos_docker_services:
  - jellyfin
  - monitoring

managed_host_volumes:
  jellyfin_media_library:
    type: nfs
    server: "{{ hostvars['pennywise'].ansible_host }}"
    path: "/mnt/pool0/managed-dirs/jellyfin-library"
    opts: "ro"
    restore: false
    backup: false
    local: "/data/media-library"
  jellyfin_config_dir:
    type: local
    local: /srv/jellyfin/config
    remote: "{{ default_remote_nas_per_host_backup_volume }}/jellyfin_config"
    restore: true
    backup: true
    owner: "lab"
    group: "lab"
    mode: "0755"
  jellyfin_cache_dir:
    type: local
    local: /srv/jellyfin/cache
    restore: false
    backup: false
    owner: "lab"
    group: "lab"
    mode: "0755"
