---
- name: L3 NixOS host convergence
  hosts: "{{ converge_group }}"
  become: true
  gather_facts: true

  vars:
    nixos_l3_dir: /etc/nixos-flakes
    nixos_l3_flake: "{{ nixos_l3_dir }}/flake.nix"

  tasks:
    - name: "Ensure dotfiles destination directory exists for {{ dot_user }}"
      become: true
      become_user: "{{ dot_user }}"
      ansible.builtin.file:
        path: "{{ dotfiles_dest }}"
        state: directory
        mode: "0755"

    - name: "Clone or update dotfiles repo (HTTPS) for {{ dot_user }}"
      become: true
      become_user: "{{ dot_user }}"
      ansible.builtin.git:
        repo: "{{ dotfiles_repo }}"
        dest: "{{ dotfiles_dest }}"
        version: "{{ dotfiles_version }}"
        update: true
        force: true

    - name: Ensure /etc/nixos exists
      ansible.builtin.file:
        path: /etc/nixos
        state: directory
        mode: "0755"

    - name: Check if hardware-configuration.nix exists
      ansible.builtin.stat:
        path: /etc/nixos/hardware-configuration.nix
      register: hw_config

    - name: Generate hardware-configuration.nix if missing
      ansible.builtin.command: nixos-generate-config --dir /etc/nixos
      when: not hw_config.stat.exists

    - name: Ensure that remote directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      with_items:
        - "{{ nixos_l3_dir }}/modules"
        - "{{ nixos_l3_dir }}/assets"

    - name: Render Starship config (TOML) into flake assets dir
      become: true
      ansible.builtin.template:
        src: starship.toml.j2
        dest: "{{ nixos_l3_dir }}/assets/starship.toml"
        owner: root
        group: root
        mode: "0644"

    - name: Render tmux.conf into flake assets dir
      become: true
      ansible.builtin.template:
        src: tmux.conf.j2
        dest: "{{ nixos_l3_dir }}/assets/tmux.conf"
        owner: root
        group: root
        mode: "0644"

    - name: AWS | Determine whether credentials are available
      ansible.builtin.set_fact:
        aws_creds_available: >-
          {{
            (aws_access_key_id | default('') | length > 0) and
            (aws_secret_access_key | default('') | length > 0)
          }}

    - name: AWS | Ensure shared aws secrets directory exists
      become: true
      ansible.builtin.file:
        path: /var/lib/homelab-secrets/aws
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: AWS | Ensure aws group exists
      become: true
      ansible.builtin.group:
        name: aws
        state: present

    - name: AWS | Write shared config (non-secret)
      become: true
      ansible.builtin.copy:
        dest: /var/lib/homelab-secrets/aws/config
        owner: root
        group: root
        mode: "0644"
        content: |
          [default]
          region = {{ aws_default_region }}
          output = json
          cli_pager =
      when: aws_creds_available  # or remove this if you want config always

    - name: AWS | Write shared credentials (root:aws 0640)
      become: true
      no_log: true
      ansible.builtin.copy:
        dest: /var/lib/homelab-secrets/aws/credentials
        owner: root
        group: aws
        mode: "0640"
        content: |
          [default]
          aws_access_key_id = {{ aws_access_key_id }}
          aws_secret_access_key = {{ aws_secret_access_key }}
      when: aws_creds_available

    - name: SSH Keys | Load keys from environment (b64)
      ansible.builtin.set_fact:
        _ssh_private_key_b64: "{{ lookup('env', 'SSH_PRIVATE_KEY') | default('', true) }}"
        _ssh_public_key_b64:  "{{ lookup('env', 'SSH_PUBLIC_KEY')  | default('', true) }}"
      no_log: true

    - name: SSH Keys | Ensure secret directories exist
      become: true
      ansible.builtin.file:
        path: "/var/lib/homelab-secrets/ssh/{{ item.user }}"
        state: directory
        owner: "{{ item.user }}"
        group: "{{ item.group }}"
        mode: "0700"
      loop:
        - { user: "root", group: "root" }
        - { user: "lab",  group: "lab"  }

    - name: SSH Keys | Write private keys
      become: true
      no_log: true
      ansible.builtin.copy:
        dest: "/var/lib/homelab-secrets/ssh/{{ item.user }}/id_ed25519"
        content: "{{ _ssh_private_key_b64 | b64decode }}"
        owner: "{{ item.user }}"
        group: "{{ item.group }}"
        mode: "0600"
      loop:
        - { user: "root", group: "root" }
        - { user: "lab",  group: "lab"  }

    - name: SSH Keys | Write public keys
      become: true
      no_log: true
      ansible.builtin.copy:
        dest: "/var/lib/homelab-secrets/ssh/{{ item.user }}/id_ed25519.pub"
        content: "{{ _ssh_public_key_b64 | b64decode }}"
        owner: "{{ item.user }}"
        group: "{{ item.group }}"
        mode: "0644"
      loop:
        - { user: "root", group: "root" }
        - { user: "lab",  group: "lab"  }

    - name: Render L3 flake.nix to host
      ansible.builtin.template:
        src: flake.nix.j2
        dest: "{{ nixos_l3_flake }}"
        mode: "0644"

    - name: Copy NixOS modules (homelab-hello + homelab-tasks) to remote modules dir
      ansible.builtin.copy:
        src: "files/{{ item }}"
        dest: "{{ nixos_l3_dir }}/modules/{{ item }}"
        owner: root
        group: root
        mode: "0644"
      loop:
        - backup-runner.nix
        - homelab-hello.nix
        - homelab-tasks.nix

    - name: Apply L3 flake (nixos-rebuild switch)
      ansible.builtin.command: >
        nixos-rebuild switch --impure --flake {{ nixos_l3_dir }}#{{ inventory_hostname }}
      register: rebuild
      changed_when: true

    - name: Get current hostname
      ansible.builtin.command: hostname
      register: current_hostname
      changed_when: false

    - name: Reboot if hostname does not match inventory name
      ansible.builtin.command: systemctl reboot
      async: 1
      poll: 0
      when: current_hostname.stdout != inventory_hostname

    - name: Wait for SSH to come back
      ansible.builtin.wait_for_connection:
        timeout: 600
      when: current_hostname.stdout != inventory_hostname

    - name: Monitoring (Docker)
      ansible.builtin.include_role:
        name: all_docker_monitoring
      when: converge_docker_monitoring
      tags: [l3, step_docker_monitoring]
