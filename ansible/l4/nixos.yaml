---
- name: L4 converge NixOS
  hosts: "{{ converge_group }}"
  become: true
  gather_facts: true

  tasks:
    - name: DevOps | Clone/update repositories into /home/lab/src
      become: true
      become_user: lab
      ansible.builtin.git:
        repo: "{{ item.repo }}"
        dest: "/home/lab/src/{{ item.dest | default(item.repo | basename | regex_replace('\\.git$', '')) }}"
        version: "{{ item.version | default('main') }}"
        update: true
        force: false
        accept_hostkey: true
      loop: "{{ source_code_repos }}"
      when: source_code_repos | default([]) | length > 0

