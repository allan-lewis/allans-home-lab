---
- name: Full NixOS host convergence for a group of hosts
  hosts: "{{ converge_group }}"
  become: true
  gather_facts: true

  tasks:
    - name: L3 | Host preparation
      ansible.builtin.include_role:
        name: l3_host_prep
        apply:
          tags: [l3, host_prep]
      when: converge_nixos
      tags: [l3, host_prep]
