---
- name: Full NixOS host convergence for a group of hosts
  hosts: "{{ converge_group }}"
  become: true
  gather_facts: true

  vars:
    nixos_dir: /etc/nixos-flakes
    nixos_flake: "{{ nixos_dir }}/flake.nix"

  tasks:
    - name: L3 | Host preparation
      ansible.builtin.include_role:
        name: l3_host_prep
        apply:
          tags: [l3, host_prep]
      when: converge_nixos
      tags: [l3, host_prep]

    - name: L3 | DevOps
      ansible.builtin.include_role:
        name: l3_devops
        apply:
          tags: [l3, devops]
      when: converge_nixos and converge_devops
      tags: [l3, devops]

    - name: L3 | NixOS switch/rebuild
      ansible.builtin.include_role:
        name: l3_host_rebuild
        apply:
          tags: [l3, host_rebuild]
      when: converge_nixos
      tags: [l3, host_rebuild]

    - name: L4 | Managed directories
      ansible.builtin.include_role:
        name: l4_managed_dirs
        apply:
          tags: [l4, managed_dirs]
      when: converge_nixos
      tags: [l4, managed_dirs]

    - name: L4 | S3 local mirror
      ansible.builtin.include_role:
        name: l4_s3_mirror
        apply:
          tags: [l4, mirror]
      when: converge_nixos and converge_s3_mirror
      tags: [l4, mirror]

    - name: L4 | DevOps
      ansible.builtin.include_role:
        name: l4_devops
        apply:
          tags: [l4, devops]
      when: converge_nixos and converge_devops
      tags: [l4, devops]

    - name: L4 | Monitoring (Docker)
      ansible.builtin.include_role:
        name: docker_monitoring
        apply:
          tags: [l4, docker_monitoring]
      when: converge_docker_monitoring
      tags: [l4, docker_monitoring]
