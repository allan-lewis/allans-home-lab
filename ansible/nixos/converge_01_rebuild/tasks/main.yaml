---
- name: HW | Check for hardware config exists in flake dir
  ansible.builtin.stat:
    path: "/etc/nixos-flakes/hosts/{{ inventory_hostname }}/hardware-configuration.nix"
  register: hw_in_flake
  changed_when: false
  tags: [rebuild, rebuild_hw]

- name: HW | Generate hardware-configuration.nix
  ansible.builtin.command: >
    /run/current-system/sw/bin/nixos-generate-config
    --show-hardware-config
  register: hw_out
  when: not hw_in_flake.stat.exists
  changed_when: true
  tags: [rebuild, rebuild_hw]

- name: HW | Write hardware-configuration.nix into flake dir (only if missing)
  ansible.builtin.copy:
    dest: "/etc/nixos-flakes/hosts/{{ inventory_hostname }}/hardware-configuration.nix"
    content: "{{ hw_out.stdout }}\n"
    owner: root
    group: root
    mode: "0644"
  when: not hw_in_flake.stat.exists
  tags: [rebuild, rebuild_hw]

- name: MODULES | Copy all custom modules to host
  ansible.builtin.copy:
    src: "files/modules"
    dest: "{{ nixos_dir }}"
    owner: root
    group: root
    mode: "0644"
  tags: [rebuild, rebuild_modules]

- name: FLAKE | Render flake to host
  ansible.builtin.template:
    src: flake.nix.j2
    dest: "{{ nixos_flake }}"
    mode: "0644"
  tags: [rebuild, rebuild_flake]

- name: SWITCH | Perform a NixOS rebuild/switch
  ansible.builtin.command: >
    nixos-rebuild switch --flake {{ nixos_dir }}#{{ inventory_hostname }}
  register: rebuild
  changed_when: true
  tags: [rebuild, rebuild_switch]

- name: SWITCH | Get current hostname
  ansible.builtin.command: hostname
  register: current_hostname
  changed_when: false
  tags: [rebuild, rebuild_switch]
  
- name: SWITCH | Reboot when hostname has changed
  ansible.builtin.reboot:
    msg: "Reboot triggered after NixOS rebuild"
    connect_timeout: 10
    reboot_timeout: 1800
    pre_reboot_delay: 3
    post_reboot_delay: 10
    test_command: "whoami"
    search_paths:
      - /run/current-system/sw/bin
      - /run/wrappers/bin
      - /sbin
      - /bin
      - /usr/sbin
      - /usr/bin
      - /usr/local/sbin
  when: current_hostname.stdout != inventory_hostname
  tags: [rebuild, rebuild_switch]