---
- name: Lookup passwd entry for user
  ansible.builtin.getent:
    database: passwd
    key: lab
  tags: [docker]

- name: Set facts
  ansible.builtin.set_fact:
    lab_uid: "{{ getent_passwd.lab[1] | int }}"
    lab_gid: "{{ getent_passwd.lab[2] | int }}"
    lab_tz: UTC
  tags: [docker]

- name: Ensure project dir exists
  ansible.builtin.file:
    path: "{{ compose_project_dir }}"
    state: directory
    mode: "0750"
  tags: [docker]

- name: Ensure that all environment variables are set
  ansible.builtin.fail:
    msg: "compose_env variable '{{ env_item.key }}' is undefined or empty."
  when: (env_item.value is not defined) or (env_item.value | string | length == 0)
  loop: "{{ (compose_config.compose_env | default({})) | dict2items }}"
  loop_control:
    loop_var: env_item
    label: "{{ env_item.key }}"
  tags: [docker]

- name: Render .env for compose
  ansible.builtin.copy:
    dest: "{{ compose_project_dir }}/.env"
    mode: "0640"
    content: |-
      {% for k, v in compose_config.compose_env.items() %}
      {{ k }}={{ v }}
      {% endfor %}
  when: (compose_config.compose_env | default([])) | length > 0
  notify: restart compose stack
  tags: [docker]

- name: Render additional templates
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ item.uid | default(0) }}"
    group: "{{ item.gid | default(0) }}"
    mode: "{{ item.mode | default('0644') }}"
  loop: "{{ compose_config.compose_extra_templates | default([]) }}"
  loop_control:
    label: "{{ item.dest }}"
  notify: restart compose stack
  tags: [docker]

- name: Fetch compose from URL
  ansible.builtin.get_url:
    url: "{{ compose_config.compose_url }}"
    dest: "{{ compose_project_dir }}/docker-compose.yml"
    mode: "0644"
  when: compose_config.compose_source_type == 'url'
  notify: restart compose stack
  tags: [docker]

- name: Copy compose from local file
  ansible.builtin.copy:
    src: "{{ compose_config.compose_file_src }}"
    dest: "{{ compose_project_dir }}/docker-compose.yml"
    mode: "0644"
  when: compose_config.compose_source_type == 'file'
  notify: restart compose stack
  tags: [docker]

- name: Render compose from template
  ansible.builtin.template:
    src: "{{ compose_config.compose_template_src }}"
    dest: "{{ compose_project_dir }}/docker-compose.yml"
    mode: "0644"
  when: compose_config.compose_source_type == 'template'
  notify: restart compose stack
  tags: [docker]

- name: Ensure stack is present (Compose v2 module)
  community.docker.docker_compose_v2:
    project_src: "{{ compose_project_dir }}"
    state: present
    remove_orphans: true
    pull: missing
    build: never
  changed_when: false
  tags: [docker]
