---
- name: Ensure that groups exist for rebuild
  become: true
  ansible.builtin.group:
    name: "{{ item }}"
    state: present
  with_items: ["aws", "lab"]

- name: Ensure that remote directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(omit) }}"
    group: "{{ item.group | default(omit) }}"
    mode: "{{ item.mode | default('0755') }}"
  with_items:
    - path: "{{ nixos_dir }}/assets"
    - path: "/var/lib/homelab-secrets/ssh/root"
    - path: "/home/lab/.dotfiles"
      owner: "lab"
      group: "lab"

- name: Render config files from templates
  become: true
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  with_items:
    - src: "tmux.conf.j2"
      dest: "{{ nixos_dir }}/assets/tmux.conf"
    - src: "starship.toml.j2"
      dest: "{{ nixos_dir }}/assets/starship.toml"

- name: Clone the legacy/external dotfiles repo
  become: true
  become_user: "lab"
  ansible.builtin.git:
    repo: "https://github.com/allan-lewis/dotfiles.git"
    dest: "/home/lab/.dotfiles"
    version: "main"
    update: true
    force: true

- name: Install ssh keys for the root user
  ansible.builtin.include_role:
    name: ssh_keypair
  vars:
    ssh_keypair_owner: "root"
