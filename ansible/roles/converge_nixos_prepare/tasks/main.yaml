---
- name: VARS | Validate required variables are set and non-empty
  ansible.builtin.fail:
    msg: >-
      Required variable '{{ required_var }}' is missing or empty.
      Ensure it is defined and non-empty in inventory, group_vars, or host_vars
      before running this play.
  when: >
    (lookup('vars', required_var, default='') | string | trim | length) == 0
  loop: "{{ nixos_required_variables | default([]) }}"
  loop_control:
    loop_var: required_var
    label: "{{ required_var }}"
  tags: [prepare, prepare_vars]

- name: GROUPS | Ensure that groups exist for rebuild
  become: true
  ansible.builtin.group:
    name: "{{ item }}"
    state: present
  with_items: "{{ nixos_converge_prepare_groups }}"
  tags: [prepare, prepare_groups]

- name: DIRS | Ensure that remote directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(omit) }}"
    group: "{{ item.group | default(omit) }}"
    mode: "{{ item.mode | default('0755') }}"
  with_items: "{{ nixos_converge_prepare_dirs }}"
  tags: [prepare, prepare_dirs]
  
- name: FILES | Render files from templates
  become: true
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode | default('0644') }}"
  with_items: "{{ nixos_converge_prepare_files }}"
  tags: [prepare, prepare_files]

- name: KEYS | Install ssh keys
  ansible.builtin.include_role:
    name: nixos_ssh_keypair
    apply: 
      tags: [prepare, prepare_keys]
  vars:
    ssh_keypair_owner: "{{ item }}"
  with_items: "{{ nixos_converge_prepare_keys }}"
  tags: [prepare, prepare_keys]

- name: DOTFILES | Clone the external dotfiles repo
  become: true
  become_user: "lab"
  ansible.builtin.git:
    repo: "https://github.com/allan-lewis/dotfiles.git"
    dest: "/home/lab/.dotfiles"
    version: "main"
    update: true
    force: true
  tags: [prepare, prepare_dotfiles]

- name: AWS | Write shared config (non-secret)
  become: true
  ansible.builtin.copy:
    dest: /var/lib/homelab-secrets/aws/config
    owner: root
    group: root
    mode: "0644"
    content: |
      [default]
      region = {{ aws_default_region }}
      output = json
      cli_pager =
  when: feature_flag_aws | bool
  tags: [prepare, prepare_aws]

- name: AWS | Write shared credentials
  become: true
  no_log: true
  ansible.builtin.copy:
    dest: /var/lib/homelab-secrets/aws/credentials
    owner: root
    group: aws
    mode: "0640"
    content: |
      [default]
      aws_access_key_id = {{ aws_access_key_id }}
      aws_secret_access_key = {{ aws_secret_access_key }}
  when: feature_flag_aws | bool
  tags: [prepare, prepare_aws]

- name: TAILSCALE | Write tailscale auth key file
  become: true
  no_log: true
  ansible.builtin.copy:
    dest: /run/secrets/tailscale-authkey
    content: "{{ tailscale_authkey }}"
    owner: root
    group: root
    mode: "0400"
  when: converge_tailscale | bool
  tags: [prepare, prepare_tailscale]

- name: DUMP | Write PostgreSQL dump password file
  no_log: true
  copy:
    content: "{{ postgres_db_password | trim }}"
    dest: /etc/allans-home-lab/secrets/postgres_dump_pass
    owner: root
    group: root
    mode: "0600"
  when: converge_postgres_dump | bool
  tags: [prepare, prepare_dump]

- name: DOPPLER | Write service token to durable secret file
  no_log: true
  ansible.builtin.copy:
    dest: /var/lib/homelab-secrets/doppler/doppler_token
    content: "{{ doppler_service_token | trim }}\n"
    owner: lab
    group: lab
    mode: "0600"
  when: feature_flag_devops | bool
  tags: [prepare, prepare_doppler]
