# ===========================================================
#  Starship Prompt — Two-Line Layout
# ===========================================================

add_newline = false
command_timeout = 1000

# ----------- Two-Line Prompt Format -----------
format = "$directory$git_branch$git_status$line_break$username$hostname$cmd_duration$time$character"

# ----------- Active Palette -----------
# palette = "catppuccin_mocha"
palette = "gruvbox_dark_hard"
# palette = "gruvbox_dark_medium"
# palette = "gruvbox_dark_soft"

# ===========================================================
# MODULES
# ===========================================================

# ---------- Character ----------
[character]
success_symbol = "[>](bold fg:green)"
error_symbol   = "[>](bold fg:red)"
vimcmd_symbol  = "[>](bold fg:blue)"

# ---------- Directory ----------
[directory]
style = "bold fg:blue"
truncation_length = 3
truncate_to_repo = true

# ---------- Git: Branch ----------
[git_branch]
symbol = ""
style = "bold fg:lavender"
format = "on [$symbol$branch]($style) "

# ---------- Git: Status ----------
[git_status]
style = "fg:yellow"
format = '([\[$all_status$ahead_behind\]]($style) )'

# ---------- Username ----------
[username]
show_always = true
style_user = "bold fg:mauve"
style_root = "bold fg:red"
format = "[$user]($style) "

# ---------- Hostname ----------
[hostname]
ssh_only = true
style = "bold fg:green"
format = "on [$hostname]($style) "

# ---------- Command Duration ----------
[cmd_duration]
min_time = 200
style = "fg:peach"
format = "took [$duration]($style) "

# ---------- Time ----------
[time]
time_format = "%H:%M"
disabled = false

# ---------- AWS ----------
[aws]
disabled = true

# ---------- Kubernetes ----------
[kubernetes]
disabled = true

