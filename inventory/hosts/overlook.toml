name = "overlook"
hostname = "overlook"

platform = "appliance"
variant = "haos"

role = "homeassistant"
description = "Home Automation"

groups = []

[management]
provisioner = "terraform"
converger = "none"

[runtime]
kind = "vm"
hypervisor = "proxmox"
node = "maturin"

[resources.cpu]
cores = 4
sockets = 1

[resources]
memory_mb = 4096
disk_gb = 32

[network]
mode = "dhcp-reservation"
dns = ["192.168.86.1"]

[network.reservation]
ip = "192.168.86.229"
mac = "02:42:AC:11:00:02"

[provisioning.terraform]
cloud_init = false
agent = false