---
- name: Converge Linux hosts
  hosts: linux
  gather_facts: true
  become: true

  vars:
    ansible_python_interpreter: "/usr/bin/python3"
    ansible_user: "lab"
  
    is_arch: "{{ 'arch' in group_names }}"
    is_ubuntu: "{{ 'ubuntu' in group_names }}"
    has_docker: "{{ 'arch_docker' in group_names or 'ubuntu_docker' in group_names }}"

    lab_timezone: "UTC"

  pre_tasks:
    - name: Assert host is a Linux host
      ansible.builtin.assert:
        that:
          - is_arch or is_ubuntu
          - not (is_arch and is_ubuntu)
        fail_msg: "Host must belong to linux and exactly one supported variant group"

    - name: Ping to verify connectivity
      ansible.builtin.ping:
      tags: [ping]

  roles:
    - role: linux_sanity
      tags: [sanity]

    - role: linux_base
      tags: [base]

    - role: linux_user
      tags: [user]

    - role: linux_hardening
      tags: [hardening]

    - role: linux_services
      tags: [services]