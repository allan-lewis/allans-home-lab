---
- name: Pacman | refresh cache & upgrade system
  community.general.pacman:
    update_cache: true
    upgrade: true
  become: true
  register: pacman_upgrade
  retries: 5       
  delay: 30         
  until: pacman_upgrade is succeeded

- name: Pacman | install base packages
  community.general.pacman:
    name: "{{ arch_base_packages }}"
    state: present
  become: true

- name: QGA | ensure qemu-guest-agent installed
  community.general.pacman:
    name: qemu-guest-agent
    state: present
  become: true
  when: arch_qga | default(true)

- name: QGA | enable & start service
  ansible.builtin.systemd:
    name: qemu-guest-agent
    enabled: true
    state: started
  become: true
  when: arch_qga | default(true)

- name: Time | set timezone
  ansible.builtin.command: "timedatectl set-timezone {{ lab_timezone }}"
  changed_when: false
  become: true

- name: Time | ensure timesyncd enabled
  ansible.builtin.systemd:
    name: systemd-timesyncd
    enabled: true
    state: started
  when: arch_base_enable_timesyncd
  become: true

- name: Journald | persistent log dir
  ansible.builtin.file:
    path: /var/log/journal
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: arch_base_journald_persistent
  become: true

- name: Journald | ensure drop-in dir exists
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: arch_base_journald_persistent
  become: true

- name: Journald | force Storage=persistent (drop-in)
  ansible.builtin.copy:
    dest: /etc/systemd/journald.conf.d/99-persistent.conf
    mode: "0644"
    owner: root
    group: root
    content: |
      [Journal]
      Storage=persistent
  changed_when: false
  become: true
