---
node_exporter_version:  "1.10.2"
node_exporter_tmp_dir: "/tmp/node_exporter-{{ node_exporter_version }}"
node_exporter_download_url: >-
  https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz
node_exporter_tarball_path: "{{ node_exporter_tmp_dir }}.tar.gz"
node_exporter_binary_path: "/usr/local/bin/node_exporter"
node_exporter_textfile_dir: "/var/lib/node_exporter/textfile_collector"
node_exporter_systemd_unit_path: "/etc/systemd/system/node_exporter.service"
node_exporter_env_file_path: "/etc/default/node_exporter"
node_exporter_listen_address: "0.0.0.0:9100"
node_exporter_extra_flags:
  - "--web.listen-address={{ node_exporter_listen_address }}"
  - "--collector.textfile.directory={{ node_exporter_textfile_dir }}"
node_exporter_service_name: "node_exporter"
