---
- name: Install Node Exporter
  ansible.builtin.include_tasks: node_exporter.yaml

- name: Install Arch-specific services
  ansible.builtin.include_tasks: arch_services.yaml
  when: is_arch

- name: Install Docker on Arch
  ansible.builtin.include_tasks: docker_arch.yaml
  when: is_arch and has_docker

- name: Install Docker on Ubuntu
  ansible.builtin.include_tasks: docker_ubuntu.yaml
  when: is_ubuntu and has_docker

- name: Install homelab metrics
  ansible.builtin.include_tasks: homelab_metrics.yaml
  when: has_docker
