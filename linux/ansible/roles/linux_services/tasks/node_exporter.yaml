---
- name: Ensure node_exporter group exists
  ansible.builtin.group:
    name: "node_exporter"
    system: true

- name: Ensure node_exporter user exists
  ansible.builtin.user:
    name: "node_exporter"
    group: "node_exporter"
    system: true
    shell: "/usr/sbin/nologin"
    create_home: false

- name: Ensure temporary directory for node_exporter exists
  ansible.builtin.file:
    path: "{{ node_exporter_tmp_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download node_exporter tarball
  ansible.builtin.get_url:
    url: "{{ node_exporter_download_url }}"
    dest: "{{ node_exporter_tarball_path }}"
    mode: "0644"

- name: Unarchive node_exporter tarball
  ansible.builtin.unarchive:
    src: "{{ node_exporter_tarball_path }}"
    dest: "{{ node_exporter_tmp_dir }}"
    remote_src: true
    creates: "{{ node_exporter_tmp_dir }}/node_exporter-{{ node_exporter_version }}.linux-amd64"

- name: Install node_exporter binary
  ansible.builtin.copy:
    src: "{{ node_exporter_tmp_dir }}/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: "{{ node_exporter_binary_path }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: true

- name: Ensure textfile directory exists
  ansible.builtin.file:
    path: "{{ node_exporter_textfile_dir }}"
    state: directory
    owner: "node_exporter"
    group: "node_exporter"
    mode: "0755"

- name: Render node_exporter environment file
  ansible.builtin.template:
    src: "node_exporter.env.j2"
    dest: "{{ node_exporter_env_file_path }}"
    owner: root
    group: root
    mode: "0644"

- name: Render node_exporter systemd unit
  ansible.builtin.template:
    src: "node_exporter.service.j2"
    dest: "{{ node_exporter_systemd_unit_path }}"
    owner: root
    group: root
    mode: "0644"

- name: Ensure Node Exporter service is enabled and running
  ansible.builtin.systemd:
    name: "{{ node_exporter_service_name }}"
    enabled: true
    state: started
    daemon_reload: true

- name: Restart Node Exporter service
  ansible.builtin.systemd:
    name: "{{ node_exporter_service_name }}"
    state: restarted
  changed_when: false
