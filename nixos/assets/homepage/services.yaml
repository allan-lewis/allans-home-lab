---
# For configuration options and examples, please see:
# https://gethomepage.dev/configs/services/

- Home Lab Management:
    - Gilead:
        icon: truenas.png
        href: https://gilead.hosts.allanshomelab.com
        description: NAS (offsite backup)
        widget:
            type: truenas
            url: https://gilead.hosts.allanshomelab.com
            username: truenas_admin
            password: "{{HOMEPAGE_VAR_TRUENAS_PASSWORD}}"
    - Derry:
        icon: asustor.png
        href: https://derry.hosts.allanshomelab.com
        description: NAS (local backup)
    - Maturin:
        icon: proxmox.png
        href: https://maturin.hosts.allanshomelab.com
        description: Hypervisor
        widget:
            type: proxmox
            url: https://maturin.hosts.allanshomelab.com
            username: "{{HOMEPAGE_VAR_MATURIN_USERNAME}}"
            password: "{{HOMEPAGE_VAR_MATURIN_PASSWORD}}"
            fields: ['vms', 'resources.cpu', 'resources.mem']
    - Pennywise:
        icon: truenas.png
        href: https://pennywise.hosts.allanshomelab.com
        description: NAS
        widget:
            type: truenas
            url: https://pennywise.hosts.allanshomelab.com
            username: truenas_admin
            password: "{{HOMEPAGE_VAR_TRUENAS_PASSWORD}}"

- Dev Ops:
    - Alertmanager:
        icon: alertmanager.png
        href: https://alertmanager.nixos.allanshomelab.com
        description: Monitoring system
    - Gatus:
        icon: gatus.png
        href: https://gatus.nixos.allanshomelab.com
        description: Health dashboard
        widget:
            type: gatus
            url: https://gatus.nixos.allanshomelab.com
    - Grafana:
        icon: grafana.png
        href: https://grafana.allanshomelab.com
        description: Operational dashboards
        widget:
            type: grafana
            url: https://grafana.allanshomelab.com
            username: "{{HOMEPAGE_VAR_GRAFANA_USERNAME}}"
            password: "{{HOMEPAGE_VAR_GRAFANA_PASSWORD}}"
            fields: ['dashboards', 'datasources']
    - Prometheus:
        icon: prometheus.png
        href: https://prometheus.nixos.allanshomelab.com
        description: Monitoring/alerting toolkit
        widget:
            type: prometheus
            url: https://prometheus.nixos.allanshomelab.com

- Networking and Authentication:
    - Authentik:
        icon: authentik.png
        href: https://authn.allanshomelab.com
        description: Identity provider
        widget:
            type: authentik
            url: https://authn.allanshomelab.com
            key: "{{HOMEPAGE_VAR_AUTHENTIK_KEY_DOCKER}}"
            version: 2
    - Cloudflared:
        icon: cloudflare.png
        href: "{{HOMEPAGE_VAR_CLOUDFLARE_URL}}"
        description: Zero trust tunnel
        widget:
            type: cloudflared
            key: "{{HOMEPAGE_VAR_CLOUDFLARE_KEY}}"
            accountid: "{{HOMEPAGE_VAR_CLOUDFLARE_ACCOUTNT_ID}}"
            tunnelid: "{{HOMEPAGE_VAR_CLOUDFLARE_TUNNEL_ID}}"
    - Nginx:
        icon: nginx.png
        href: https://nginx.nixos.allanshomelab.com
        description: Web server
    - Pi-hole:
        icon: pi-hole.png
        href: https://dns.nixos.allanshomelab.com
        description: Backup DNS server
        widget:
            type: pihole
            url: https://dns.nixos.allanshomelab.com
            version: 6
            key: "{{HOMEPAGE_VAR_PIHOLE_KEY_DOCKER}}"
    - Tailscale:
        icon: tailscale.png
        href: https://login.tailscale.com/admin/machines
        description: Mesh VPN
    - Traefik:
        icon: traefik.png
        href: https://traefik.nixos.allanshomelab.com
        description: Reverse proxy/load balancer
        widget:
            type: traefik
            url: https://traefik.nixos.allanshomelab.com
    - Twingate:
        icon: twingate.png
        href: https://allanshomelab.twingate.com/networks/overview
        description: Zero-trust access

- Media:
    - Bazarr:
        icon: bazarr.png
        href: https://bazarr.media.allanshomelab.com
        description: Subtitle management
        widget:
            type: bazarr
            url: https://bazarr.media.allanshomelab.com
            key: "{{HOMEPAGE_VAR_BAZARR_KEY}}"
    - Immich:
        icon: immich.png
        href: https://photos.allanandvaia.com
        description: Photo and video management
        widget:
            type: immich
            url: https://photos.allanandvaia.com
            key: "{{HOMEPAGE_VAR_IMMICH_KEY}}"
            version: 2
    - Jellyfin:
        icon: jellyfin.png
        href: https://jellyfin.media.allanshomelab.com
        description: Media server
        widget:
            type: jellyfin
            url: https://jellyfin.media.allanshomelab.com
            key: "{{HOMEPAGE_VAR_JELLYFIN_KEY}}"
            enableBlocks: true # optional, defaults to false
            enableNowPlaying: true # optional, defaults to true
            enableUser: true # optional, defaults to false
            enableMediaControl: false # optional, defaults to true
            showEpisodeNumber: true # optional, defaults to false
            expandOneStreamToTwoRows: false # optional, defaults to true
    - Lidarr:
        icon: lidarr.png
        href: https://lidarr.media.allanshomelab.com
        description: Music management
        widget:
            type: lidarr
            url: https://lidarr.media.allanshomelab.com
            key: "{{HOMEPAGE_VAR_LIDARR_KEY}}"
    - Plex:
        icon: plex.png
        href: https://plex.media.allanshomelab.com
        description: Media server
        widget:
            type: plex
            url: https://plex.media.allanshomelab.com
            key: "{{HOMEPAGE_VAR_PLEX_KEY}}"
    - Prowlarr:
        icon: prowlarr.png
        href: https://prowlarr.media.allanshomelab.com
        description: Indexer manager
        widget:
            type: prowlarr
            url: https://prowlarr.media.allanshomelab.com
            key: "{{HOMEPAGE_VAR_PROWLARR_KEY}}"
    - Radarr:
        icon: radarr.png
        href: https://radarr.media.allanshomelab.com
        description: Movie management
        widget:
            type: radarr
            url: https://radarr.media.allanshomelab.com
            key: "{{HOMEPAGE_VAR_RADARR_KEY}}"
    - Sonarr:
        icon: sonarr.png
        href: https://sonarr.media.allanshomelab.com
        description: Show management
        widget:
            type: sonarr
            url: https://sonarr.media.allanshomelab.com
            key: "{{HOMEPAGE_VAR_SONARR_KEY}}"
    - Tautulli:
        icon: tautulli.png
        href: https://tautulli.media.allanshomelab.com
        description: Plex monitoring and analytics
        widget:
            type: tautulli
            url: https://tautulli.media.allanshomelab.com
            key: "{{HOMEPAGE_VAR_TAUTULLI_KEY}}"
    - Transmission:
        icon: transmission.png
        href: https://transmission.media.allanshomelab.com
        description: Torrent download client
        widget:
            type: transmission
            url: https://transmission.media.allanshomelab.com

- Productivity:
    - IT Tools:
        icon: it-tools.png
        href: https://tools.docker.allanshomelab.com
        description: Handy tools for developers
    - Trilium:
        icon: trilium.png
        href: https://notes.allanshomelab.com
        description: Personal knowledge base
        widget:
            type: trilium
            url: https://notes.allanshomelab.com
            key: "{{HOMEPAGE_VAR_TRILIUM_TOKEN}}"
    - Vaultwarden:
        icon: bitwarden.png
        href: https://vault.allanshomelab.com
        description: Secrets management

- Home Automation:
    - Homeassistant:
        icon: home-assistant.png
        href: https://home.allanandvaia.com
        description: Home automation server
        widget:
            type: homeassistant
            url: https://home.allanandvaia.com
            key: "{{HOMEPAGE_VAR_HOMEASSIST_KEY}}"