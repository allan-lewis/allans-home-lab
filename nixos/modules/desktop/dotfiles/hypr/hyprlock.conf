background {
    monitor =
    path = /home/lab/wallpapers/default.png
    blur_passes = 2
    blur_size = 5
}

label {
    monitor =
    text = $TIME
    font_family = JetBrainsMono Nerd Font
    font_size = 64
    color = rgb(8fa8c9)
    position = 0, 440
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 56
    position = 0, 360
    halign = center
    valign = center

    font_family = JetBrainsMono Nerd Font
    font_color = rgb(111, 141, 184)

    inner_color = rgb(30, 45, 74)
    outer_color = rgb(111, 141, 184)
    check_color = rgb(143, 168, 201)
    fail_color = rgb(111, 141, 184)

    outline_thickness = 3
    rounding = 12
    fade_on_empty = true

    placeholder_text = enter password
    fail_text = password incorrect
}